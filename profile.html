<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Profile</title>

<link rel="stylesheet" href="css/profile.css">

</head>
<body>

<header class="profile-header">

<img
src="assets/logo/akhor-ghor-logo.png"
class="profile-logo">

<h1>My Learning Profile</h1>

</header>


<!-- Progress Section -->

<section class="section">

<h2>Your Progress</h2>

<div class="progress-grid">

<div class="progress-card">

<h3>Swara</h3>

<div id="swaraPercent">
0%
</div>

</div>

<div class="progress-card">

<h3>Vyanjan</h3>

<div id="vyanjanPercent">
0%
</div>

</div>

<div class="progress-card">

<h3>Numbers</h3>

<div id="numberPercent">
0%
</div>

</div>

</div>

</section>


<!-- Achievement Section -->

<section class="section">

<h2>Achievements</h2>

<div id="achievementList">

</div>

</section>


<!-- Settings -->

<section class="section">

<h2>Settings</h2>

<div class="setting-item">

<label>Dark Mode</label>

<input
type="checkbox"
id="darkMode">

</div>

<div class="setting-item">

<label>Sound Effects</label>

<input
type="checkbox"
id="soundToggle"
checked>

</div>

</section>


<!-- Actions -->

<section class="section">

<button id="resetBtn">

Reset Progress

</button>

</section>


<!-- App Info -->

<section class="section">

<h2>About Akhor Ghor</h2>

<p>

Assamese Alphabet Learning App

Version 1.0.0

</p>

</section>

<a href="index.html">

</a>

</a>

class="active">

</a>

</nav>


<script src="js/profile.js"></script>

</body>
</html>
